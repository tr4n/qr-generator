<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code View</title>
    <link rel="icon" href="logo.png" type="image/png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                    }
                }
            }
        }
    </script>
    <!-- QR Code Styling Library -->
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f9fafb;
            margin: 0;
            gap: 24px;
        }
    </style>
</head>

<body class="antialiased text-gray-800">
    <div id="qr-container"
        class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-center items-center"></div>
    <div class="flex gap-4 w-full px-4" id="button-container" style="max-width: 380px; display: none;">
        <button id="download-btn"
            class="flex-1 bg-primary hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-xl transition-colors flex justify-center items-center gap-2 shadow-sm hover:shadow-md text-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            Download
        </button>
        <button id="copy-btn"
            class="flex-1 bg-white hover:bg-gray-50 text-gray-800 border border-gray-200 font-medium py-3 px-4 rounded-xl transition-colors flex justify-center items-center gap-2 shadow-sm hover:shadow-md text-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
            Copy
        </button>
        <button id="customize-btn"
            class="flex-1 bg-white hover:bg-gray-50 text-gray-800 border border-gray-200 font-medium py-3 px-4 rounded-xl transition-colors flex justify-center items-center gap-2 shadow-sm hover:shadow-md text-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
            Customize
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            
            let queryUpdated = false;
            if (!urlParams.has('data')) {
                urlParams.set('data', window.location.href);
                queryUpdated = true;
            }
            if (!urlParams.has('size')) {
                urlParams.set('size', '320x320');
                queryUpdated = true;
            }
            if (queryUpdated) {
                window.history.replaceState({}, '', `${window.location.pathname}?${urlParams.toString()}`);
            }

            const dataStr = urlParams.get('data');
            let width = 320, height = 320;
            const sizeParam = urlParams.get('size');
            if (sizeParam) {
                if (sizeParam.includes('x')) {
                    const parts = sizeParam.split('x');
                    if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                        width = Number(parts[0]);
                        height = Number(parts[1]);
                    }
                } else if (!isNaN(sizeParam)) {
                    width = height = Number(sizeParam);
                }
            }

            let logoImage = undefined;
            const logoParam = urlParams.get('logo');
            // Fully embed the base64 SVG so it never fails on file:// or strict CORS environments
            if (logoParam === 'dabeeo') {
                logoImage = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMjgiIGhlaWdodD0iMTI4IiB2aWV3Qm94PSIwIDAgMTYgMTYiIGZpbGw9Im5vbmUiPgogIDxwYXRoIGQ9Ik0xLjAxNTYyIDMuOTk3MjdWMTEuOTkxOEw3Ljk3NjEyIDE1Ljk4OTFMMTQuOTM2NiAxMS45OTE4VjMuOTk3MjdMNy45NzYxMiAwTDEuMDE1NjIgMy45OTcyN1oiIGZpbGw9IndoaXRlIi8+CiAgPHBhdGggZD0iTTMuMTg3NSAxMC43ODk0VjUuMzA1NDZMNy45NjI3NyAyLjU2MzQ4TDEyLjczOCA1LjMwNTQ2VjEwLjc4OTRMNy45NjI3NyAxMy41MzE0TDMuMTg3NSAxMC43ODk0WiIgZmlsbD0iIzRCNkNDQiIvPgogIDxwYXRoIGQ9Ik03Ljk2Mjc3IDEzLjUzMTNMMTIuNzM4IDEwLjc4OTNMNy45NjI3NyA4LjQwODA4TDMuMTg3NSAxMC43ODkzTDcuOTYyNzcgMTMuNTMxM1oiIGZpbGw9IiMxOTNGOEUiLz4KICA8cGF0aCBkPSJNMSAzLjk5NzI3TDMuMTg1MjIgNS4yNTI1Nkw3Ljk2MDUgMi41MTA2TDEyLjczNTggNS4yNTI1NkwxNC45MjEgMy45OTcyN0w3Ljk2MDUgMEwxIDMuOTk3MjdaIiBmaWxsPSIjRENFN0Y0Ii8+CiAgPHBhdGggZD0iTTcuOTc2NTYgMTMuNDg5NFYxNkwxNC45MzcgMTIuMDAyN1Y0LjAwODE4TDEyLjc1MTggNS4yNjM0N1YxMC43NDc0TDcuOTc2NTYgMTMuNDg5NFoiIGZpbGw9IiNDNUNDRDYiLz4KICA8cGF0aCBkPSJNMTIuNzM2MiAxMC43ODk0TDcuOTYwOTQgOC40MDgxNlYyLjU2MzQ4TDEyLjczNjIgNS4zMDU0NlYxMC43ODk0WiIgZmlsbD0iIzFFNTdEQyIvPgogIDxwYXRoIGQ9Ik0xMC4zOTExIDguNzQzM0MxMC4zOTExIDkuMzQwODkgOS45MDIwNyA5LjgyNzM1IDkuMzAxMjggOS44MjczNUM4LjcwMDQ3IDkuODI3MzUgOC4yMTE0IDkuMzQwODkgOC4yMTE0IDguNzQzM0M4LjIxMTQgOC4xNDU3MyA4LjcwMDQ3IDcuNjU5MjcgOS4zMDEyOCA3LjY1OTI3VjcuMDc2MjdDOS4yNjQ2MyA3LjA3NjI3IDkuMjI5ODQgNy4wNzk5IDkuMTk1MDMgNy4wODE3M0M5LjAxMDAyIDcuMDc5OSA4Ljg1OTg0IDYuOTMwNTIgOC44NTk4NCA2Ljc0NjVDOC44NTk4NCA2LjU2MjQ5IDkuMDEwMDIgNi40MTMxIDkuMTk1MDMgNi40MTMxQzkuMzgwMDQgNi40MTMxIDkuNTMwMjMgNi41NjI0OSA5LjUzMDIzIDYuNzQ2NUgxMC4xMTY0QzEwLjExNjQgNi4yNDAwMiA5LjcwMjQyIDUuODMwMDggOS4xOTUwMyA1LjgzMDA4QzguNjg3NjUgNS44MzAwOCA4LjI3MzY5IDYuMjQxODMgOC4yNzM2OSA2Ljc0NjVDOC4yNzM2OSA2Ljk1NjAxIDguMzQ1MTEgNy4xNDczMiA4LjQ2NDE4IDcuMzAyMTlDNy45NjQxMiA3LjU5MDA1IDcuNjI1MjcgOC4xMjkzNCA3LjYyNTI3IDguNzQ1MTNDNy42MjUyNyA5LjM2MDk0IDcuMTM2MiA5LjgyOTE4IDYuNTM1MzkgOS44MjkxOEM1LjkzNDU5IDkuODI5MTggNS40NDU1MiA5LjM0MjcyIDUuNDQ1NTIgOC43NDUxM0M1LjQ0NTUyIDguMTQ3NTYgNS45MzQ1OSA3L             } else if (logoParam) {
                const isValidImage = await new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => resolve(true);
                    img.onerror = () => resolve(false);
                    img.src = logoParam;
                });
                if (isValidImage) {
                    logoImage = logoParam;
                } else {
                    console.warn("Provided logo image is invalid or inaccessible, ignoring logo.");
                }
            }

            document.getElementById('button-container').style.display = 'flex';
            document.getElementById('button-container').style.maxWidth = Math.max(width + 32, 380) + 'px'; // +32 for container padding

            const options = {
                width: width,
                height: height,
                type: "svg",
                data: dataStr,
                margin: 0,
                image: logoImage,
                qrOptions: {
                    typeNumber: 0,
                    mode: "Byte",
                    errorCorrectionLevel: "Q"
                },
                dotsOptions: {
                    color: "#111827",
                    type: "dots"
                },
                backgroundOptions: {
                    color: "#ffffff",
                },
                cornersSquareOptions: {
                    color: "#111827",
                    type: "extra-rounded"
                },
                cornersDotOptions: {
                    color: "#111827",
                    type: "dot"
                },
                imageOptions: {
                    hideBackgroundDots: true,
                    imageSize: 0.4,
                    margin: Math.max(1, Math.floor(width * 0.0125))
                }
            };

            const qrCode = new QRCodeStyling(options);
            qrCode.append(document.getElementById('qr-container'));

            const processExport = async (action) => {
                const exportOptions = { ...options, type: "svg" };
                const exportQrCode = new QRCodeStyling(exportOptions);

                const showSuccessFeedback = (btnId) => {
                    const btn = document.getElementById(btnId);
                    const originalHtml = btn.innerHTML;
                    btn.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                        <span class="text-green-600">${action === 'copy' ? 'Copied!' : 'Downloaded!'}</span>
                    `;
                    setTimeout(() => {
                        btn.innerHTML = originalHtml;
                    }, 2000);
                };

                try {
                    const svgBlob = await exportQrCode.getRawData("svg");
                    if (!svgBlob) throw new Error("SVG generation failed");

                    const url = URL.createObjectURL(svgBlob);
                    const img = new Image();
                    // We don't set crossOrigin anonymous here for data URI blob exports to preserve file:// protocol compatibility

                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = () => reject(new Error("Failed to load SVG into memory"));
                        img.src = url;
                    });

                    const canvas = document.createElement("canvas");
                    const scale = 4; // High DPI 4x scale to eliminate aliasing
                    canvas.width = width * scale;
                    canvas.height = height * scale;
                    const ctx = canvas.getContext("2d");
                    ctx.scale(scale, scale);
                    ctx.fillStyle = exportOptions.backgroundOptions?.color || "#ffffff";
                    ctx.fillRect(0, 0, width, height);
                    ctx.drawImage(img, 0, 0, width, height);
                    URL.revokeObjectURL(url);

                    if (action === 'download') {
                        const pngDataUrl = canvas.toDataURL("image/png");
                        const a = document.createElement("a");
                        a.download = "qr-code.png";
                        a.href = pngDataUrl;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        showSuccessFeedback('download-btn');
                    } else if (action === 'copy') {
                        canvas.toBlob(async (blob) => {
                            if (!blob) throw new Error("Could not extract PNG data");
                            try {
                                await navigator.clipboard.write([
                                    new ClipboardItem({ "image/png": blob })
                                ]);
                                showSuccessFeedback('copy-btn');
                            } catch (err) {
                                console.error('Clipboard write failed:', err);
                                alert("Could not copy image to clipboard. Please check browser permissions.");
                            }
                        }, "image/png");
                    }
                } catch (e) {
                    console.error('Client-side export failed, attempting fallback...', e);
                    try {
                        exportOptions.type = "canvas";
                        const fallbackQrCode = new QRCodeStyling(exportOptions);
                        if (action === 'download') {
                            await fallbackQrCode.download({ name: "qr-code", extension: "png" });
                            showSuccessFeedback('download-btn');
                        } else {
                            const blob = await fallbackQrCode.getRawData("png");
                            if (!blob) throw new Error("Could not extract PNG data via fallback");
                            await navigator.clipboard.write([
                                new ClipboardItem({ "image/png": blob })
                            ]);
                            showSuccessFeedback('copy-btn');
                        }
                    } catch (fallbackError) {
                        console.error("Fallback failed:", fallbackError);
                        alert("Operation failed. Processing error.");
                    }
                }
            };

            document.getElementById('download-btn').addEventListener('click', () => processExport('download'));
            document.getElementById('copy-btn').addEventListener('click', () => processExport('copy'));
            document.getElementById('customize-btn').addEventListener('click', () => {
                window.location.href = 'index.html' + window.location.search;
            });
        });
    </script>
</body>

</html>
