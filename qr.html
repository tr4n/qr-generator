<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code View</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                    }
                }
            }
        }
    </script>
    <!-- QR Code Styling Library -->
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f9fafb;
            margin: 0;
            gap: 24px;
        }
    </style>
</head>
<body class="antialiased text-gray-800">
    <div id="qr-container" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-center items-center"></div>
    <div class="flex gap-4 w-full px-4" id="button-container" style="max-width: 300px; display: none;">
        <button id="download-btn" class="flex-1 bg-primary hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-xl transition-colors flex justify-center items-center gap-2 shadow-sm hover:shadow-md text-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            Download
        </button>
        <button id="copy-btn" class="flex-1 bg-white hover:bg-gray-50 text-gray-800 border border-gray-200 font-medium py-3 px-4 rounded-xl transition-colors flex justify-center items-center gap-2 shadow-sm hover:shadow-md text-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
            Copy
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (!urlParams.has('data')) {
                document.getElementById('qr-container').innerHTML = '<p class="text-gray-500 font-medium text-sm">No data provided.</p>';
                return;
            }

            const dataStr = urlParams.get('data');
            let width = 400, height = 400;
            const sizeParam = urlParams.get('size');
            if (sizeParam) {
                if (sizeParam.includes('x')) {
                    const parts = sizeParam.split('x');
                    if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                        width = Number(parts[0]);
                        height = Number(parts[1]);
                    }
                } else if (!isNaN(sizeParam)) {
                    width = height = Number(sizeParam);
                }
            }
            
            let logoImage = undefined;
            const logoParam = urlParams.get('logo');
            // Fully embed the base64 SVG so it never fails on file:// or strict CORS environments
            if (logoParam === 'dabeeo') {
                logoImage = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNiAxNiIgZmlsbD0ibm9uZSI+CiAgPHBhdGggZD0iTTEuMDE1NjIgMy45OTcyN1YxMS45OTE4TDcuOTc2MTIgMTUuOTg5MUwxNC45MzY2IDExLjk5MThWMy45OTcyN0w3Ljk3NjEyIDBMMS4wMTU2MiAzLjk5NzI3WiIgZmlsbD0id2hpdGUiLz4KICA8cGF0aCBkPSJNMy4xODc1IDEwLjc4OTRWNS4zMDU0Nkw3Ljk2Mjc3IDIuNTYzNDhMMTIuNzM4IDUuMzA1NDZWMTAuNzg5NEw3Ljk2Mjc3IDEzLjUzMTRMMy4xODc1IDEwLjc4OTRaIiBmaWxsPSIjNEI2Q0NCIi8+CiAgPHBhdGggZD0iTTcuOTYyNzcgMTMuNTMxM0wxMi43MzggMTAuNzg5M0w3Ljk2Mjc3IDguNDA4MDhMMy4xODc1IDEwLjc4OTMwNy45NjI3NyAxMy41MzEzWiIgZmlsbD0iIzE5M0Y4RSIvPgogIDxwYXRoIGQ9Ik0xIDMuOTk3MjdMMy4xODUyMiA1LjI1MjU2TDcuOTYwNSAyLjUxMDZMMTIuNzM1OCA1LjI1MjU2TDE0LjkyMSAzLjk5NzI3TDcuOTYwNSAwTDEgMy45OTcyN1oiIGZpbGw9IiNEQ0U3RjQiLz4KICA8cGF0aCBkPSJNNy45NzY1NiAxMy40ODk0VjE2TDE0LjkzNyAxMi4wMDI3VjQuMDA4MThMMTIuNzUxOCA1LjI2MzQ3VjEwLjc0NzRMNy45NzY1NiAxMy40ODk0WiIgZmlsbD0iI0M1Q0NENiIvPgogIDxwYXRoIGQ9Ik0xMi43MzYyIDEwLjc4OTRMNy45NjA5NCA4LjQwODE2VjIuNTYzNDhMMTIuNzM2MiA1LjMwNTQ2VjEwLjc4OTRaIiBmaWxsPSIjMUU1N0RDIi8+CiAgPHBhdGggZD0iTTEwLjM5MTEgOC43NDMzQzEwLjM5MTEgOS4zNDA4OSA5LjkwMjA3IDkuODI3MzUgOS4zMDEyOCA5LjgyNzM1QzguNzAwNDcgOS44MjczNSA4LjIxMTQgOS4zNDA4OSA4LjIxMTQgOC43NDMzQzguMjExNCA4LjE0NTczIDguNzAwNDcgNy42NTkyNyA5LjMwMTI4IDcuNjU5MjdWNy4wNzYyN0M5LjI2NDYzIDcuMDc2MjcgOS4yMjk4NCA3LjA3OTkgOS4xOTUwMyA3LjA4MTczQzkuMDEwMDIgNy4wNzk5IDguODU5ODQgNi45MzA1MiA4Ljg1OTg0IDYuNzQ2NUM4Ljg1OTg0IDYuNTYyNDkgOS4wMTAwMiA2LjQxMzEgOS4xOTUwMyA2LjQxMzFDOS4zODAwNCA2LjQxMzEgOS41MzAyMyA2LjU2MjQ5IDkuNTMwMjMgNi43NDY1SDEwLjExNjRDMTAuMTE2NCA2LjI0MDAyIDkuNzAyNDIgNS44MzAwOCA5LjE5NTAzIDUuODMwMDhDOC42ODc2NSA1LjgzMDA4IDguMjczNjkgNi4yNDE4MyA4LjI3MzY5IDYuNzQ2NUM4Ljg1OTg0IDYuOTU2MDEgOC4zNDUxMSA3LjE0NzMyIDguNDY0MTggNy4zMDIxOUM3Ljk2NDEyIDcuNTkwMDUgNy42MjUyNyA4LjEyOTM0IDcuNjI1MjcgOC43NDUxM0M3LjYyNTI3IDkuMzYwOTQgNy4xMzYyIDkuODI5MTggNi41MzUzOSA5LjgyOTE4QzUuOTM0NTkgOS44MjkxOCA1LjQ0NTUyIDkuMzQyNzIgNS40NDU1MiA4Ljc0NTEzQzUuNDQ1NTIgOC4xNDc1NiA1LjkzNDU5IDcuNjYxMSA2LjUzNTM5IDcuNjYxMVY3LjA3O             } else if (logoParam) {
                const isValidImage = await new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => resolve(true);
                    img.onerror = () => resolve(false);
                    img.src = logoParam;
                });
                if (isValidImage) {
                    logoImage = logoParam;
                } else {
                    console.warn("Provided logo image is invalid or inaccessible, ignoring logo.");
                }
            }

            document.getElementById('button-container').style.display = 'flex';
            document.getElementById('button-container').style.maxWidth = Math.max(width + 32, 300) + 'px'; // +32 for container padding

            const options = {
                width: width,
                height: height,
                type: "svg",
                data: dataStr,
                margin: 0,
                image: logoImage,
                qrOptions: {
                    typeNumber: 0,
                    mode: "Byte",
                    errorCorrectionLevel: "Q"
                },
                dotsOptions: {
                    color: "#111827",
                    type: "dots"
                },
                backgroundOptions: {
                    color: "#ffffff",
                },
                cornersSquareOptions: {
                    color: "#111827",
                    type: "extra-rounded"
                },
                cornersDotOptions: {
                    color: "#111827",
                    type: "dot"
                },
                imageOptions: {
                    hideBackgroundDots: true,
                    imageSize: 0.4,
                    margin: Math.max(1, Math.floor(width * 0.0125))
                }
            };

            const qrCode = new QRCodeStyling(options);
            qrCode.append(document.getElementById('qr-container'));

            const processExport = async (action) => {
                const exportOptions = { ...options, type: "svg" };
                const exportQrCode = new QRCodeStyling(exportOptions);

                const showSuccessFeedback = (btnId) => {
                    const btn = document.getElementById(btnId);
                    const originalHtml = btn.innerHTML;
                    btn.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                        <span class="text-green-600">${action === 'copy' ? 'Copied!' : 'Downloaded!'}</span>
                    `;
                    setTimeout(() => {
                        btn.innerHTML = originalHtml;
                    }, 2000);
                };

                try {
                    const svgBlob = await exportQrCode.getRawData("svg");
                    if (!svgBlob) throw new Error("SVG generation failed");

                    const url = URL.createObjectURL(svgBlob);
                    const img = new Image();
                    // We don't set crossOrigin anonymous here for data URI blob exports to preserve file:// protocol compatibility
                    
                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = () => reject(new Error("Failed to load SVG into memory"));
                        img.src = url;
                    });
                    
                    const canvas = document.createElement("canvas");
                    const scale = 4; // High DPI 4x scale to eliminate aliasing
                    canvas.width = width * scale;
                    canvas.height = height * scale;
                    const ctx = canvas.getContext("2d");
                    ctx.scale(scale, scale);
                    ctx.fillStyle = exportOptions.backgroundOptions?.color || "#ffffff";
                    ctx.fillRect(0, 0, width, height);
                    ctx.drawImage(img, 0, 0, width, height);
                    URL.revokeObjectURL(url);
                    
                    if (action === 'download') {
                        const pngDataUrl = canvas.toDataURL("image/png");
                        const a = document.createElement("a");
                        a.download = "qr-code.png";
                        a.href = pngDataUrl;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        showSuccessFeedback('download-btn');
                    } else if (action === 'copy') {
                        canvas.toBlob(async (blob) => {
                            if (!blob) throw new Error("Could not extract PNG data");
                            try {
                                await navigator.clipboard.write([
                                    new ClipboardItem({ "image/png": blob })
                                ]);
                                showSuccessFeedback('copy-btn');
                            } catch(err) {
                                console.error('Clipboard write failed:', err);
                                alert("Could not copy image to clipboard. Please check browser permissions.");
                            }
                        }, "image/png");
                    }
                } catch (e) {
                    console.error('Client-side export failed, attempting fallback...', e);
                    try {
                        exportOptions.type = "canvas";
                        const fallbackQrCode = new QRCodeStyling(exportOptions);
                        if (action === 'download') {
                            await fallbackQrCode.download({ name: "qr-code", extension: "png" });
                            showSuccessFeedback('download-btn');
                        } else {
                            const blob = await fallbackQrCode.getRawData("png");
                            if (!blob) throw new Error("Could not extract PNG data via fallback");
                            await navigator.clipboard.write([
                                new ClipboardItem({ "image/png": blob })
                            ]);
                            showSuccessFeedback('copy-btn');
                        }
                    } catch (fallbackError) {
                        console.error("Fallback failed:", fallbackError);
                        alert("Operation failed. Processing error.");
                    }
                }
            };

            document.getElementById('download-btn').addEventListener('click', () => processExport('download'));
            document.getElementById('copy-btn').addEventListener('click', () => processExport('copy'));
        });
    </script>
</body>
</html>
