<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scan QR Code</title>
  <link rel="stylesheet" href="popup.css">
  <script src="qr-code-styling.js"></script>
</head>
<body>
  <div class="header">
    <span class="title">Scan QR Code</span>
    <button class="close-btn" id="closeBtn" title="Close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <div class="qr-wrapper">
    <div id="qr-container"></div>
  </div>

  <div class="url-container">
    <input type="text" id="urlInput" readonly>
  </div>

  <div class="footer">
    <button class="icon-btn" id="infoBtn" title="Open in web app">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
    </button>
    <div class="actions">
      <button id="copyBtn" class="btn btn-outline">Copy</button>
      <button id="downloadBtn" class="btn btn-primary">Download</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
